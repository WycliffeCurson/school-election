<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heshima Election — Results</title>
  <link rel="stylesheet" href="css/results.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#063B25">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Heshima Votes">
</head>

<body>
  <main>

    <!-- HEADER -->
    <div class="school-name">
      <h3>Heshima Road Primary and Junior School</h3>
      <p>Electoral System</p>
      <div class="divider"></div>
      <h1>ELECTION RESULTS</h1>
      <div class="nav-buttons">
        <button class="nav-btn nav-btn-manage" onclick="window.location.href='admin-panel.html'">
          Manage Candidates
        </button>
        <button class="nav-btn nav-btn-summary" onclick="window.location.href='summary.html'">
          📋 View Summary
        </button>
        <button class="nav-btn nav-btn-logout" id="logoutBtn">
          Logout
        </button>
      </div>
    </div>

    <!-- RESULTS SECTION -->
    <section class="results-section">

      <div class="voter-summary" id="voterSummary">
        <span>Total Votes Cast: <strong id="totalVotesCast">—</strong></span>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" data-target="chair">Chair</button>
        <button class="tab" data-target="vice">Vice-Chair</button>
        <button class="tab" data-target="speaker">Speaker</button>
        <div class="underline"></div>
      </div>

      <!-- TAB CONTENT -->
      <div class="tab-content">

        <div class="group active" id="chair">
          <div class="content-box" id="chair-box">
            <p style="color:#aaa; text-align:center; padding:2rem;">Loading results...</p>
          </div>
        </div>

        <div class="group" id="vice">
          <div class="content-box" id="vice-box">
            <p style="color:#aaa; text-align:center; padding:2rem;">Loading results...</p>
          </div>
        </div>

        <div class="group" id="speaker">
          <div class="content-box" id="speaker-box">
            <p style="color:#aaa; text-align:center; padding:2rem;">Loading results...</p>
          </div>
        </div>

      </div>
    </section>

  </main>
  <script type="module" src="js/results.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>

</html>
