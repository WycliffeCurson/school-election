<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Election Summary — Heshima Road Primary</title>
  <link rel="stylesheet" href="css/summary.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#063B25">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Heshima Votes">
</head>

<body>

  <!-- TOP NAV -->
  <nav class="top-nav">
    <h2>Heshima Road Primary — Election Summary</h2>
    <div class="nav-actions">
      <button class="nav-btn btn-back" onclick="window.location.href='results.html'">← Results</button>
      <button class="nav-btn btn-print" onclick="window.print()">🖨️ Print</button>
      <button class="nav-btn btn-logout" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <!-- SUMMARY CONTENT -->
  <div class="summary-wrapper" id="summaryWrapper">
    <div class="loading-msg">Loading election summary...</div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase/config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      collection, getDocs, query, where, doc, getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    /* ── ROUTE GUARD ── */
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "index.html"; return; }
      const userDoc = await getDoc(doc(db, "users", user.uid));
      const userData = userDoc.data();
      if (!userData || userData.role !== "admin") { window.location.href = "index.html"; return; }
      document.body.style.visibility = "visible";
      await buildSummary();
    });

    /* ── LOGOUT ── */
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });

    /* ── BUILD SUMMARY ── */
    async function buildSummary() {
      const wrapper = document.getElementById("summaryWrapper");
      try {
        const [usersSnap, votesSnap, chairSnap, viceSnap, speakerSnap] = await Promise.all([
          getDocs(collection(db, "users")),
          getDocs(collection(db, "votes")),
          getDocs(query(collection(db, "candidates"), where("position", "==", "chair"))),
          getDocs(query(collection(db, "candidates"), where("position", "==", "vice"))),
          getDocs(query(collection(db, "candidates"), where("position", "==", "speaker"))),
        ]);

        // Users
        let totalRegistered = 0, totalVoted = 0;
        usersSnap.forEach(d => {
          const data = d.data();
          if (data.role === "voter") {
            totalRegistered++;
            if (data.hasVoted) totalVoted++;
          }
        });
        const totalDidNotVote = totalRegistered - totalVoted;
        const turnoutPct = totalRegistered > 0
          ? Math.round((totalVoted / totalRegistered) * 100) : 0;

        // Votes
        const voteCounts = {};
        const votesByPosition = { chair: 0, vice: 0, speaker: 0 };
        votesSnap.forEach(d => {
          const { candidateId, position } = d.data();
          if (candidateId) voteCounts[candidateId] = (voteCounts[candidateId] || 0) + 1;
          if (position && votesByPosition[position] !== undefined) votesByPosition[position]++;
        });

        const spoilt = {
          chair: totalVoted - votesByPosition.chair,
          vice: totalVoted - votesByPosition.vice,
          speaker: totalVoted - votesByPosition.speaker,
        };

        // Candidates
        function buildCandidates(snap) {
          let arr = [];
          snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
          return arr.map(c => ({ ...c, votes: voteCounts[c.id] || 0 }))
            .sort((a, b) => b.votes - a.votes);
        }

        const chairC = buildCandidates(chairSnap);
        const viceC = buildCandidates(viceSnap);
        const speakerC = buildCandidates(speakerSnap);

        const generatedAt = new Date().toLocaleString("en-KE", {
          dateStyle: "full", timeStyle: "short"
        });

        wrapper.innerHTML = `

          <div class="summary-header">
            <h2>Heshima Road Primary and Junior School</h2>
            <div class="header-divider"></div>
            <h1>OFFICIAL ELECTION SUMMARY</h1>
            <p>Generated: ${generatedAt}</p>
          </div>

          <div class="section-title">📊 Overview</div>
          <div class="overview-grid">
            <div class="stat-box">
              <div class="stat-value">${totalRegistered}</div>
              <div class="stat-label">Registered Voters</div>
            </div>
            <div class="stat-box highlight">
              <div class="stat-value">${totalVoted}</div>
              <div class="stat-label">Votes Cast</div>
            </div>
            <div class="stat-box warning">
              <div class="stat-value">${totalDidNotVote}</div>
              <div class="stat-label">Did Not Vote</div>
            </div>
            <div class="stat-box">
              <div class="stat-value">${turnoutPct}%</div>
              <div class="stat-label">Voter Turnout</div>
            </div>
          </div>

          <div class="turnout-section">
            <div class="turnout-label">
              <span>Voter Turnout</span>
              <span><strong>${totalVoted}</strong> of <strong>${totalRegistered}</strong> students voted</span>
            </div>
            <div class="turnout-bar-bg">
              <div class="turnout-bar-fill" style="width:${turnoutPct}%"></div>
            </div>
          </div>

          <div class="section-title">🔍 Vote Integrity</div>
          <div class="integrity-section">
            <div class="integrity-grid">
              <div class="integrity-item ${spoilt.chair === 0 ? 'ok' : 'warn'}">
                <div class="i-value">${spoilt.chair}</div>
                <div class="i-label">Uncast — Chairperson</div>
              </div>
              <div class="integrity-item ${spoilt.vice === 0 ? 'ok' : 'warn'}">
                <div class="i-value">${spoilt.vice}</div>
                <div class="i-label">Uncast — Vice Chair</div>
              </div>
              <div class="integrity-item ${spoilt.speaker === 0 ? 'ok' : 'warn'}">
                <div class="i-value">${spoilt.speaker}</div>
                <div class="i-label">Uncast — Speaker</div>
              </div>
            </div>
            <p style="font-size:0.78rem;color:#999;margin-top:0.8rem;line-height:1.5;">
              * Uncast votes indicate positions where a student did not complete their selection.
              A value of 0 means all votes were successfully cast for that position.
            </p>
          </div>

          <div class="section-title">🏆 Results by Position</div>
          ${renderBlock("Chairperson", "chair", "badge-chair", "fill-chair", chairC, votesByPosition.chair)}
          ${renderBlock("Vice Chairperson", "vice", "badge-vice", "fill-vice", viceC, votesByPosition.vice)}
          ${renderBlock("Speaker", "speaker", "badge-speaker", "fill-speaker", speakerC, votesByPosition.speaker)}

          <div class="section-title">✍️ Certification</div>
          <div class="signature-section">
            <div>
              <div class="sig-line"></div>
              <div class="sig-label">Presiding Teacher</div>
              <div class="sig-title">Name & Signature</div>
            </div>
            <div>
              <div class="sig-line"></div>
              <div class="sig-label">School Administrator</div>
              <div class="sig-title">Name & Signature</div>
            </div>
            <div>
              <div class="sig-line"></div>
              <div class="sig-label">Date</div>
              <div class="sig-title">DD / MM / YYYY</div>
            </div>
            <div>
              <div class="sig-line"></div>
              <div class="sig-label">Official Stamp / Seal</div>
              <div class="sig-title"></div>
            </div>
          </div>

          <div class="summary-footer">
            Heshima Road Primary and Junior School — Electoral System &nbsp;|&nbsp;
            This document is an official record of the ${new Date().getFullYear()} election results.
          </div>
        `;

      } catch (err) {
        console.error(err);
        wrapper.innerHTML = `<div class="loading-msg" style="color:red;">
          Failed to load summary. Please refresh the page.</div>`;
      }
    }

    /* ── RENDER POSITION BLOCK ── */
    function renderBlock(title, position, badgeClass, fillClass, candidates, totalPosVotes) {
      const winner = candidates[0];
      const rows = candidates.map((c, i) => {
        const pct = totalPosVotes > 0
          ? Math.round((c.votes / totalPosVotes) * 100) : 0;
        const isWinner = i === 0 && c.votes > 0;
        return `
          <tr class="${isWinner ? 'winner-row' : ''}">
            <td>${i + 1}.
              ${c.photo
            ? `<img src="${c.photo}" style="width:32px;height:32px;border-radius:4px;object-fit:cover;vertical-align:middle;margin-left:6px;">`
            : ''}
            </td>
            <td>
              <strong>${c.name}</strong>
              ${isWinner ? '<span class="winner-badge">✓ Winner</span>' : ''}
              <br><span style="font-size:0.78rem;color:#777;">${c.className || ''}</span>
            </td>
            <td style="text-align:center;">${c.votes} ${c.votes === 1 ? 'vote' : 'votes'}</td>
            <td>
              <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end;">
                <div class="mini-bar-bg">
                  <div class="mini-bar-fill ${fillClass}" style="width:${pct}%"></div>
                </div>
                <span class="pct-text">${pct}%</span>
              </div>
            </td>
          </tr>`;
      }).join('');

      return `
        <div class="position-block">
          <div class="position-header">
            <span class="position-badge ${badgeClass}">${title}</span>
            <span class="position-meta">
              <strong>${totalPosVotes}</strong> votes cast &nbsp;|&nbsp;
              Winner: <strong>${winner && winner.votes > 0 ? winner.name : 'No votes yet'}</strong>
            </span>
          </div>
          <div class="table-scroll">
            <table class="candidate-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Candidate</th>
                  <th style="text-align:center;">Votes</th>
                  <th style="text-align:right;">Share</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>

</html>
